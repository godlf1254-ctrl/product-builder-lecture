<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 5가지 자동 생성기</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-color: #222;
            --label-color: #888;
            --border-color: #eee;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --btn-bg: #ef233c;
            --btn-hover: #d90429;
            --toggle-bg: #e0e0e0;
            --toggle-text: #333;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --label-color: #bbb;
            --border-color: #333;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --btn-bg: #ff4d6d;
            --btn-hover: #ff758f;
            --toggle-bg: #333;
            --toggle-text: #f0f0f0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px var(--shadow-color);
            width: 450px;
            text-align: center;
            position: relative;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        h1 { color: var(--text-color); margin-bottom: 25px; transition: color 0.3s; }
        
        /* 테마 토글 버튼 */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--toggle-bg);
            color: var(--toggle-text);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            width: auto;
            transition: 0.3s;
        }

        /* 5세트가 담길 리스트 공간 */
        #lotto-list {
            margin-bottom: 25px;
        }
        
        /* 한 줄(세트) 디자인 */
        .lotto-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .lotto-row:last-child { border-bottom: none; }
        
        .set-label {
            font-weight: bold;
            color: var(--label-color);
            font-size: 0.9rem;
            width: 30px;
        }

        .balls-wrap {
            display: flex;
            gap: 8px;
        }

        .ball {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .generate-btn:hover { background-color: var(--btn-hover); transform: scale(1.02); }
        .generate-btn:active { transform: scale(0.98); }

        /* 제휴 문의 폼 스타일 */
        .contact-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: left;
        }
        .contact-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: var(--label-color);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--container-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2b2d42;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        [data-theme="dark"] .submit-btn {
            background-color: #4a4e69;
        }
        .submit-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">다크 모드</button>
    <h1>🚀 로또 5가지 자동</h1>
    <div id="lotto-list">
        </div>
    <button class="generate-btn" onclick="generateFiveGames()">행운의 번호 뽑기</button>

    <!-- 제휴 문의 폼 추가 -->
    <div class="contact-section">
        <h2>🤝 제휴 문의</h2>
        <form action="https://formspree.io/f/xjgjvzvn" method="POST">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" name="email" id="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea name="message" id="message" placeholder="제휴 제안이나 문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>
</div>

<script>
    // 테마 토글 함수
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', targetTheme);
        localStorage.setItem('theme', targetTheme);
        updateToggleButton(targetTheme);
    }

    function updateToggleButton(theme) {
        const btn = document.getElementById('theme-toggle');
        btn.innerText = theme === 'dark' ? '라이트 모드' : '다크 모드';
    }

    // 초기 테마 설정
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateToggleButton(savedTheme);

    function getLottoNumbers() {
        const numbers = [];
        while (numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }
        return numbers.sort((a, b) => a - b);
    }

    function getBallColor(num) {
        if (num <= 10) return '#fbc02d'; // 노랑
        if (num <= 20) return '#1976d2'; // 파랑
        if (num <= 30) return '#e53935'; // 빨강
        if (num <= 40) return '#757575'; // 회색
        return '#43a047'; // 초록
    }

    function generateFiveGames() {
        const listContainer = document.getElementById('lotto-list');
        listContainer.innerHTML = ''; // 초기화

        const labels = ['A', 'B', 'C', 'D', 'E'];

        for (let i = 0; i < 5; i++) {
            const row = document.createElement('div');
            row.className = 'lotto-row';

            // 세트 이름 (A~E)
            const label = document.createElement('span');
            label.className = 'set-label';
            label.innerText = labels[i];
            row.appendChild(label);

            // 번호 생성 및 공 추가
            const ballsWrap = document.createElement('div');
            ballsWrap.className = 'balls-wrap';
            
            const nums = getLottoNumbers();
            nums.forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.style.backgroundColor = getBallColor(num);
                ball.innerText = num;
                ballsWrap.appendChild(ball);
            });

            row.appendChild(ballsWrap);
            listContainer.appendChild(row);
        }
    }

    // 페이지 로드 시 바로 한 번 실행
    window.onload = generateFiveGames;
</script>

</body>
</html>
